user  nxt;
worker_processes  auto;

worker_rlimit_nofile 300000;
events {
    worker_connections  16000;
    use epoll;
        accept_mutex on;
        multi_accept on;
}
thread_pool pool_nxt threads=32 max_queue=0;
http {

    include       mime.types;
    default_type  application/octet-stream;
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    reset_timedout_connection on;
    gzip off;
    fastcgi_read_timeout 200;
    access_log off;
    keepalive_timeout 10;
    include balance.conf;
    include block.conf; 
    http3_stream_buffer_size 256k;
    send_timeout 20m;
    sendfile_max_chunk 512k;
    lingering_close off;
    aio threads=pool_nxt;
    more_clear_headers Server;
    more_clear_headers X-Powered-By;
    client_body_timeout 13s;
    client_header_timeout 13s;
    client_max_body_size 3m;
    #NXT_EXTRA

#NXT_EXTRA
    #limit_req_zone $binary_remote_addr zone=one:30m rate=20r/s;
    server {
        listen 80;  
        index index.php index.html index.htm;
        root /home/nxt/public/;
        server_tokens off;
        error_page 404 = @send4xx;
        include ssl.conf;
        chunked_transfer_encoding off;
        resolver 1.1.1.1 1.0.0.1 valid=300s;
        resolver_timeout 5s;
        if ( $request_method !~ ^(GET|POST)$ ) {
                  return 444;
        }
        rewrite_log on;

        if ($request_uri ~* (data:image/jpeg) ) {return 444; }

        error_page 500 502 503 504 /custom_50x.html;
        location = /custom_50x.html {
            echo "";
            internal;
        }

        error_page 400 401 403 /custom_40x.html;
        location = /custom_40x.html {
            echo "";
            internal;
        }



        rewrite ^/live/play/(.*)/(.*)$ /play/live.php?token=$1&id=$2 break;
        rewrite ^/movie/play/(.*)/(.*)$ /play/movie.php?token=$1&id=$2 break;
        rewrite ^/series/play/(.*)/(.*)$ /play/movie.php?token=$1&id=$2 break;

        rewrite ^/live/token/(.*)$ /play/live.php?token=$1 break;
        rewrite ^/movie/token/(.*)$ /play/movie.php?token=$1 break;
        rewrite ^/series/token/(.*)$ /play/movie.php?token=$1 break;
        rewrite ^/hls/(.*)/(.*)$ /play/segment.php?seg=$2&token=$1 break;
        rewrite ^/hlsr/(.*)/(.*)/(.*)/(.*)/(.*)/(.*)$ /play/live.php?token=$1&username=$2&password=$3&segment=$6&stream=$4&key_seg=$5 break;
        rewrite ^/timeshift/(.*)/(.*)/(.*)/(.*)/(.*)\.(.*)$ /play/timeshift.php?username=$1&password=$2&stream=$5&extension=$6&duration=$3&start=$4 break;
        rewrite ^/timeshifts/(.*)/(.*)/(.*)/(.*)/(.*)\.(.*)$ /play/timeshift.php?username=$1&password=$2&stream=$4&extension=$6&duration=$3&start=$5 break;
        rewrite ^/(.*)/(.*)/(\d+)$ /play/live.php?username=$1&password=$2&stream=$3&extension=ts break;
        rewrite ^/live/(.*)/(.*)/(.*)\.(.*)$ /play/live.php?username=$1&password=$2&stream=$3&extension=$4&type=live break;


        location = /system/progress.php {
            allow 127.0.0.1;
                deny all;
                fastcgi_pass php;
                include fastcgi_params;
                fastcgi_ignore_client_abort on;
                fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        }
        
        location ^~ /images/ {
            # 
        }
        location ^~ /images/index.html {
            return 404;
        }
        location ~ /images/.php$ {
            return 404;
        }
        
        location = /system/live.php {
                        deny all;
        }
        
        location = /system/sapi.php {
                        deny all;
        }
        location /nginx_status {
          stub_status on;
          access_log off;
          allow 127.0.0.1;
          deny all;
        }

        location @send4xx {
                     include send4xx.conf;
        }

        location ~ \.php$ {
            #limit_req zone=one burst=8;
            try_files $uri =404;
            fastcgi_index index.php;
            fastcgi_pass php;
            include fastcgi_params;
            fastcgi_buffering on;
            fastcgi_buffers 96 32k;
            fastcgi_buffer_size 32k;
            fastcgi_max_temp_file_size 0;
            fastcgi_keep_conn on;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        }
    }


        server {
            listen 8585 ;
            index index.php index.html index.htm;
            root /home/nxt/public/system/;
            server_tokens off;
            chunked_transfer_encoding off;
            if ( $request_method !~ ^(GET|POST)$ ) {
                     return 444;
            }
            rewrite_log on;

            if ($request_uri ~* (data:image/jpeg) ) {return 444; }


            error_page 500 502 503 504 /custom_50x.html;
            location = /custom_50x.html {
                echo "";
                internal;
            }

            error_page 400 401 404 403 /custom_40x.html;
            location = /custom_40x.html {
                echo "";
                internal;
            }

            location = /progress.php {
                    allow 127.0.0.1;
                    deny all;
                    fastcgi_pass php;
                    include fastcgi_params;
                    fastcgi_ignore_client_abort on;
                    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                    fastcgi_param SCRIPT_NAME $fastcgi_script_name;
            }

            location = /ip.php {
                    fastcgi_pass php;
                    include fastcgi_params;
                    fastcgi_ignore_client_abort on;
                    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                    fastcgi_param SCRIPT_NAME $fastcgi_script_name;
            }

	    location = /3M {
		add_header Access-Control-Allow-Origin * always;
        	add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        	add_header Access-Control-Expose-Headers "Content-Length, Content-Type" always;

            }



            location ~ \.php$ {
                        #limit_req zone=one burst=8;
                        try_files $uri =404;
                        fastcgi_index index.php;
                        fastcgi_pass php;
                        include fastcgi_params;
                        fastcgi_buffering on;
                        fastcgi_buffers 96 32k;
                        fastcgi_buffer_size 32k;
                        fastcgi_max_temp_file_size 0;
                        fastcgi_keep_conn on;
                        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
                    }
          }
        include certs-vhost/*.conf;
        include .vhost/*.conf;
}

