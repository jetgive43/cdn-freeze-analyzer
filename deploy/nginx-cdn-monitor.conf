# Reverse proxy: HTTP :80 → Node app on 127.0.0.1:5000 (API + React SPA + /ws).
# Install:
#   sudo cp deploy/nginx-cdn-monitor.conf /etc/nginx/sites-available/cdn-monitor
#   sudo ln -sf /etc/nginx/sites-available/cdn-monitor /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Prereq: backend running with frontend/build present (npm run build in frontend/).

server {
	listen 80 default_server;
	listen [::]:80 default_server;
	server_name 194.120.230.185 _;

	client_max_body_size 25m;

	location /ws {
		proxy_pass http://127.0.0.1:5000;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_read_timeout 86400;
	}

	location / {
		proxy_pass http://127.0.0.1:5000;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
}
