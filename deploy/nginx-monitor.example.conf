# Example: TLS + HTTP Basic for the monitor (adjust paths, server_name, cert paths).
# 1. sudo cp deploy/htpasswd /etc/nginx/.htpasswd-cdn-monitor
# 2. Include this server block or merge into your site config.
# 3. nginx -t && sudo systemctl reload nginx

upstream cdn_monitor_api {
    server 127.0.0.1:5000;
}

server {
    listen 443 ssl http2;
    server_name monitor.example.com;

    ssl_certificate     /path/to/fullchain.pem;
    ssl_certificate_key /path/to/privkey.pem;

    auth_basic           "CDN Monitor";
    auth_basic_user_file /etc/nginx/.htpasswd-cdn-monitor;

    # React build (optional: replace with proxy to serve on 3000)
    root /home/cdn-freeze-detect/frontend/build;
    index index.html;

    location /api/ {
        proxy_pass http://cdn_monitor_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 300s;
    }

    location /ws {
        proxy_pass http://cdn_monitor_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 86400;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
